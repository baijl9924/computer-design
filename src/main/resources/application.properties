spring.application.name=Geometric
server.port=${SERVER_PORT:8080}

# Frontend origin used by CORS (see controller annotations)
app.frontend.origin=${APP_FRONTEND_ORIGIN:https://kephhzx.cc.cd}

# Primary AI endpoint configuration
# Compatible environment variables:
# - AI_API_BASE_URL / AI_API_MODEL / AI_API_KEY
# - keeps backward compatibility with AI_API_URL / AI_API_PRIMARY_MODEL / AI_API_PRIMARY_KEY
ai.api.base-url=${AI_API_BASE_URL:${AI_API_URL:https://openrouter.ai/api/v1/chat/completions}}
ai.api.key=${AI_API_KEY:${AI_API_PRIMARY_KEY:}}
ai.api.model=${AI_API_MODEL:${AI_API_PRIMARY_MODEL:nvidia/nemotron-nano-12b-v2-vl:free}}

# Optional fallback AI endpoint
# Compatible environment variables:
# - AI_API_FALLBACK_BASE_URL / AI_API_FALLBACK_MODEL / AI_API_FALLBACK_KEY
ai.api.fallback.base-url=${AI_API_FALLBACK_BASE_URL:${AI_API_BASE_URL:${AI_API_URL:https://openrouter.ai/api/v1/chat/completions}}}
ai.api.fallback.key=${AI_API_FALLBACK_KEY:}
ai.api.fallback.model=${AI_API_FALLBACK_MODEL:stepfun/step-3.5-flash:free}

# One-click advanced model configuration
# Prefer setting AI_API_ADVANCED_BASE_URL / AI_API_ADVANCED_MODEL / AI_API_ADVANCED_KEY directly.
# If only AI_API_ADVANCED_MODELS is provided, the service will probe available models on the advanced endpoint.
ai.api.advanced.base-url=${AI_API_ADVANCED_BASE_URL:${AI_API_ADVANCED_URL:https://anyrouter.top}}
ai.api.advanced.key=${AI_API_ADVANCED_KEY:}
ai.api.advanced.model=${AI_API_ADVANCED_MODEL:}
ai.api.advanced.models=${AI_API_ADVANCED_MODELS:claude-4-opus}

# Allow large request bodies for base64 images
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
