<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>几何实验室注册</title>
    <link rel="stylesheet" href="/account-entry.css" />
  </head>
  <body data-page="register">
    <main class="page-shell">
      <section class="brand-side">
        <div>
          <div class="brand-chip">
            <span class="dot"></span>
            <span>几何实验室注册中心</span>
          </div>
          <h1>创建你的学习账号，<br />保存每一条错题记录。</h1>
          <p>
            这是独立的注册页面。注册成功后你会自动登录，
            当前会话也会同步写回主应用。
          </p>
          <div class="hero-list">
            <div class="hero-item">
              <strong>完整注册流程</strong>
              <span>这里支持填写姓名、学号、用户名、密码以及确认密码。</span>
            </div>
            <div class="hero-item">
              <strong>自动登录</strong>
              <span>注册成功后会立即完成登录，并自动跳回应用。</span>
            </div>
            <div class="hero-item">
              <strong>工程化接入</strong>
              <span>页面直接连接账号服务，并复用同一套浏览器会话存储。</span>
            </div>
          </div>
        </div>
        <div class="brand-footer">
          <span class="footer-pill">注册后自动登录</span>
          <span class="footer-pill">支持填写学号</span>
          <span class="footer-pill">成功后返回应用</span>
        </div>
      </section>

      <section class="form-side">
        <div class="top-links">
          <a href="/">返回应用</a>
          <nav class="page-tabs">
            <a href="/login.html">登录</a>
            <a class="active" href="/register.html">注册</a>
          </nav>
        </div>

        <div class="form-card">
          <div class="form-header">
            <h2>注册</h2>
            <p>创建账号后即可开启错题本自动归档。</p>
          </div>

          <div id="sessionCard" class="session-card">
            <strong id="sessionTitle"></strong>
            <p id="sessionText"></p>
          </div>

          <div id="statusBox" class="status-box"></div>

          <form id="accountForm" class="form-grid">
            <label class="field">
              <span class="field-label">显示名称</span>
              <input
                id="displayName"
                name="display_name"
                type="text"
                maxlength="32"
                autocomplete="name"
                placeholder="请输入显示名称"
                required
              />
            </label>

            <label class="field">
              <span class="field-label">学号</span>
              <input
                id="studentNo"
                name="student_no"
                type="text"
                maxlength="32"
                autocomplete="off"
                placeholder="可选填写，但建议补充"
              />
              <span class="field-hint">此项可选，建议填写，方便后续更清晰地管理错题档案。</span>
            </label>

            <label class="field">
              <span class="field-label">用户名</span>
              <input
                id="username"
                name="username"
                type="text"
                maxlength="32"
                autocomplete="username"
                placeholder="3-32 位，可包含字母、数字、点、下划线或短横线"
                required
              />
            </label>

            <label class="field">
              <span class="field-label">密码</span>
              <input
                id="password"
                name="password"
                type="password"
                maxlength="128"
                autocomplete="new-password"
                placeholder="至少 6 位字符"
                required
              />
            </label>

            <label class="field">
              <span class="field-label">确认密码</span>
              <input
                id="confirmPassword"
                name="confirm_password"
                type="password"
                maxlength="128"
                autocomplete="new-password"
                placeholder="请再次输入密码"
                required
              />
            </label>

            <div class="redirect-note" id="redirectNote"></div>

            <div class="form-actions">
              <button id="submitButton" class="primary-btn" type="submit">注册并登录</button>
              <button id="logoutButton" class="ghost-btn" type="button">清除当前浏览器会话</button>
            </div>
          </form>

          <div class="helper-links">
            <a href="/login.html">已有账号？去登录</a>
            <a href="/">跳过注册并返回应用</a>
          </div>
        </div>
      </section>
    </main>

    <script src="/account-entry.js"></script>
  </body>
</html>
