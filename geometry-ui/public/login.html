<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>几何实验室登录</title>
    <link rel="stylesheet" href="/account-entry.css" />
  </head>
  <body data-page="login">
    <main class="page-shell">
      <section class="brand-side">
        <div>
          <div class="brand-chip">
            <span class="dot"></span>
            <span>几何实验室账号中心</span>
          </div>
          <h1>先登录，<br />你的错题档案才真正属于你。</h1>
          <p>
            这是独立的登录页面。主程序在不登录的情况下也可以使用，
            但只有登录后，AI 错题分析结果才能自动保存到你的个人档案中。
          </p>
          <div class="hero-list">
            <div class="hero-item">
              <strong>独立入口</strong>
              <span>使用真正独立的 <code>login.html</code> 页面，而不是应用内的小面板。</span>
            </div>
            <div class="hero-item">
              <strong>自动返回</strong>
              <span>登录成功后会自动跳回主应用，你可以立刻继续使用。</span>
            </div>
            <div class="hero-item">
              <strong>错题档案</strong>
              <span>后续 AI 分析结果可以保存到你的个人错题档案中，并支持折叠查看。</span>
            </div>
          </div>
        </div>
        <div class="brand-footer">
          <span class="footer-pill">主应用可免登录使用</span>
          <span class="footer-pill">登录后开启自动保存</span>
          <span class="footer-pill">共享浏览器会话</span>
        </div>
      </section>

      <section class="form-side">
        <div class="top-links">
          <a href="/">返回应用</a>
          <nav class="page-tabs">
            <a class="active" href="/login.html">登录</a>
            <a href="/register.html">注册</a>
          </nav>
        </div>

        <div class="form-card">
          <div class="form-header">
            <h2>登录</h2>
            <p>登录后，错题本记录将保存到你的账号下。</p>
          </div>

          <div id="sessionCard" class="session-card">
            <strong id="sessionTitle"></strong>
            <p id="sessionText"></p>
          </div>

          <div id="statusBox" class="status-box"></div>

          <form id="accountForm" class="form-grid">
            <label class="field">
              <span class="field-label">用户名</span>
              <input
                id="username"
                name="username"
                type="text"
                maxlength="32"
                autocomplete="username"
                placeholder="请输入用户名"
                required
              />
            </label>

            <label class="field">
              <span class="field-label">密码</span>
              <input
                id="password"
                name="password"
                type="password"
                maxlength="128"
                autocomplete="current-password"
                placeholder="请输入密码"
                required
              />
            </label>

            <div class="redirect-note" id="redirectNote"></div>

            <div class="form-actions">
              <button id="submitButton" class="primary-btn" type="submit">登录</button>
              <button id="logoutButton" class="ghost-btn" type="button">清除当前浏览器会话</button>
            </div>
          </form>

          <div class="helper-links">
            <a href="/register.html">还没有账号？立即注册</a>
            <a href="/">跳过登录并返回应用</a>
          </div>
        </div>
      </section>
    </main>

    <script src="/account-entry.js"></script>
  </body>
</html>
